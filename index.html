<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOFÍA Web App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="top-menu">
  <div class="menu-item" data-page="finanzas">Finanzas</div>
  <div class="menu-item" data-page="salud">Salud</div>
  <div class="menu-item" data-page="educacion">Educación</div>
  <div class="menu-item" data-page="recetas">Recetas</div>
  <div class="menu-item" data-page="motivacion">Motivación</div>
</div>
  <!-- LOGIN -->
  <div id="login-screen">
    <h2>Bienvenida</h2>
    <input type="password" id="login-pass" placeholder="Contraseña">
    <button id="login-btn">Entrar</button>
    <p id="login-error"></p>
  </div>

  <!-- CONTENIDO DE LA APP (OCULTO AL INICIO) -->
  <div id="app-content" style="display:none;">

    <!-- MENÚ SUPERIOR (solo aparece después del login) -->
    <nav id="top-menu">
      <div class="menu-item" data-page="finanzas">🏦 Finanzas</div>
      <div class="menu-item" data-page="salud">❤️ Salud</div>
      <div class="menu-item" data-page="educacion">📚 Educación</div>
      <div class="menu-item" data-page="recetas">🍲 Recetas</div>
      <div class="menu-item" data-page="motivacion">⭐ Motivación</div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="main-page">
      <h2>Bienvenida a SOFÍA</h2>
      <p>Selecciona una sección del menú.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
<div id="top-menu">
  <div class="menu-item" data-page="finanzas">Finanzas</div>
  <div class="menu-item" data-page="salud">Salud</div>
  <div class="menu-item" data-page="educacion">Educación</div>
  <div class="menu-item" data-page="recetas">Recetas</div>
  <div class="menu-item" data-page="motivacion">Motivación</div>
</div>
