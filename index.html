<!DOCTYPE html>
<html lang="es">
<head>

  <title>SOFÍA · Familia MX</title>

</head>

<body>

<!-- SECCIÓN 1: LOGIN -->
<div id="login-screen" style="display: flex;">
  <div class="login-container">
    <h1 class="login-title">SOFÍA</h1>
    <p class="login-sub">Ingresa tu contraseña</p>
    <input type="password" id="login-pass" maxlength="8" class="login-input">
    <button id="login-btn" class="login-btn">Entrar</button>
    <p id="login-error" class="login-error"></p>
  </div>
</div>

<!-- SECCIÓN 2: CONTENIDO PRINCIPAL -->
<div id="app-content" style="display:none;">
  <h2>Bienvenida a SOFÍA</h2>
  <p>Tu asistente familiar.</p>
</div>

<script src="script.js"></script>

</body>
</html>
