<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión cerrada — SOFÍA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            margin-top: 20px;
            padding: 12px 20px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 95%;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Sesión cerrada</h2>
    <p>Tu sesión ha sido cerrada correctamente.</p>

    <button onclick="goLogin()">Volver a iniciar sesión</button>
</div>

<script>
function goLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
