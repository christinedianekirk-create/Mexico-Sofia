<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto – Stash & Studio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1 class="titulo" id="producto-nombre">Producto</h1>
    </header>

    <main class="detalle-container">
        <img id="producto-imagen" class="detalle-imagen" src="" alt="Producto">

        <div class="detalle-info">
            <h2 id="producto-precio"></h2>
            <p id="producto-descripcion"></p>

            <button class="btn-comprar">
                Comprar
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
