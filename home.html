<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFÍA — Menú Principal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            cursor: pointer;
            font-weight: bold;
        }
        .item:hover {
            background: #eaeaea;
        }
        button {
            margin-top: 25px;
            padding: 12px 20px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Bienvenido a SOFÍA</h2>
<p>Selecciona una sección</p>

<div class="menu">
    <div class="item" onclick="go('modules/cursos/index.html')">Cursos</div>
    <div class="item" onclick="go('modules/salud/index.html')">Salud</div>
    <div class="item" onclick="go('modules/software/index.html')">Software</div>
    <div class="item" onclick="go('modules/tiendas/index.html')">Tiendas</div>
    <div class="item" onclick="go('modules/videos/index.html')">Videos</div>
</div>

<button onclick="logout()">Cerrar sesión</button>

<script>
function go(path) {
    window.location.href = path;
}

function logout() {
    window.location.href = "logout.html";
}
</script>

</body>
</html>
