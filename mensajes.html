<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFÍA — Mensajes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2a004f, #5a00b8, #8a2be2);
            padding: 20px;
            color: white;
            text-align: center;
        }
        .box {
            background: rgba(0,0,0,0.35);
            padding: 25px;
            border-radius: 15px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 25px rgba(138,43,226,0.6);
            backdrop-filter: blur(6px);
        }
        h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #e3baff;
            text-shadow: 0 0 10px #b46cff;
        }
        textarea {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            border: none;
            padding: 15px;
            font-size: 16px;
            margin-top: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            box-shadow: 0 0 10px rgba(180,108,255,0.4);
        }
        button {
            margin-top: 20px;
            padding: 14px 25px;
            background: #b46cff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            width: 90%;
            box-shadow: 0 0 15px #d28cff;
        }
        button:hover {
            background: #d28cff;
            box-shadow: 0 0 20px #e3baff;
        }
        .msg {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: left;
            box-shadow: 0 0 10px rgba(180,108,255,0.4);
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Mensajes</h2>

    <textarea id="text" placeholder="Escribe un mensaje..."></textarea>
    <button onclick="send()">Enviar mensaje</button>

    <div id="messages"></div>

    <button onclick="back()">Volver al Dashboard</button>
</div>

<script>
function send() {
    const text = document.getElementById("text").value.trim();
    if (!text) return;

    const messages = JSON.parse(localStorage.getItem("messages") || "[]");
    messages.push(text);
    localStorage.setItem("messages", JSON.stringify(messages));

    document.getElementById("text").value = "";
    loadMessages();
}

function loadMessages() {
    const messages = JSON.parse(localStorage.getItem("messages") || "[]");
    const box = document.getElementById("messages");
    box.innerHTML = "";

    messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "msg";
        div.innerText = msg;
        box.appendChild(div);
    });
}

function back() {
    window.location.href = "dashboard.html";
}

loadMessages();
</script>

</body>
</html>
