<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVO Panel</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #fafafa;
        }

        header {
            background: #8E24AA;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #6A1B9A;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-size: 18px;
            margin-top: 10px;
            text-decoration: none;
        }

        .btn:hover {
            background: #5E178A;
        }
    </style>
</head>

<body>

<header>KIVO TAREAS PRO — PANEL</header>

<div class="container">

    <div class="card">
        <h2>Bienvenido</h2>
        <p>Este es el panel principal del sistema de tareas digitales.</p>
    </div>

    <div class="card">
        <h3>Opciones</h3>
        <a class="btn" href="tareas.html">Ver Tareas</a>
    </div>

    <div class="card">
        <h3>Progreso semanal</h3>
        <p>Meta: <strong>$1,000 USD</strong></p>
        <p>Ganado esta semana: <span id="ganado">$0</span></p>
        <a class="btn" onclick="sumar()">Agregar $10</a>
    </div>

</div>

<script>
let dinero = 0;

function sumar() {
    dinero += 10;
    document.getElementById("ganado").innerText = "$" + dinero;
}
</script>

</body>
</html>
