<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFÍA — Familia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2a004f, #5a00b8, #8a2be2);
            padding: 20px;
            color: white;
            text-align: center;
        }
        .box {
            background: rgba(0,0,0,0.35);
            padding: 25px;
            border-radius: 15px;
            max-width: 550px;
            margin: auto;
            box-shadow: 0 0 25px rgba(138,43,226,0.6);
            backdrop-filter: blur(6px);
        }
        h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #e3baff;
            text-shadow: 0 0 10px #b46cff;
        }
        .member {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            margin-top: 12px;
            text-align: left;
            box-shadow: 0 0 15px rgba(180,108,255,0.4);
        }
        .label {
            font-weight: bold;
            color: #e3baff;
        }
        button {
            margin-top: 25px;
            padding: 14px 25px;
            background: #b46cff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            width: 90%;
            box-shadow: 0 0 15px #d28cff;
        }
        button:hover {
            background: #d28cff;
            box-shadow: 0 0 20px #e3baff;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Mi Familia</h2>

    <div id="list"></div>

    <button onclick="back()">Volver al Dashboard</button>
</div>

<script>
function loadFamily() {
    const approved = localStorage.getItem("approvedName");
    const blocked = localStorage.getItem("blocked");
    const pin = localStorage.getItem("userPIN");
    const last = localStorage.getItem("lastAccess");

    const list = document.getElementById("list");
    list.innerHTML = "";

    const div = document.createElement("div");
    div.className = "member";

    div.innerHTML = `
        <p><span class="label">Nombre:</span> ${approved || "No registrado"}</p>
        <p><span class="label">Estado:</span> ${blocked === "true" ? "Bloqueado" : "Activo"}</p>
        <p><span class="label">PIN:</span> ${pin ? "••••" : "No creado"}</p>
        <p><span class="label">Último acceso:</span> ${last || "Nunca"}</p>
    `;

    list.appendChild(div);
}

function back() {
    window.location.href = "dashboard.html";
}

loadFamily();
</script>

</body>
</html>
